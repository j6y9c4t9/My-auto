name: Sync and Extract Nodes

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pyyaml

      - name: Run Extraction Script
        env:
          SUB_URL: ${{ secrets.SUB_URL }}
        run: python extract_nodes.py

      - name: Read traffic info
        id: traffic
        run: |
          if [ -f traffic_info.txt ]; then
            TRAFFIC_INFO=$(cat traffic_info.txt | tr '\n' ' | ')
            echo "info=${TRAFFIC_INFO}" >> $GITHUB_OUTPUT
          else
            echo "info=无流量数据" >> $GITHUB_OUTPUT
          fi

      - name: Get Beijing Time
        id: time
        run: |
          export TZ='Asia/Shanghai'
          echo "bj_time=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Commit and Push if changed
        id: git_push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add my_subscription.yaml
          if ! git diff --cached --quiet; then
            git commit -m "自动更新：同步提取最新节点"
            git push
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "节点已更新并推送到仓库。"
          else
            echo "updated=false" >> $GITHUB_OUTPUT
            echo "节点无变化，跳过更新。"
          fi

      - name: Notify Telegram on Success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *💡 节点同步任务执行成功！*

            *📅 时间:* `${{ steps.time.outputs.bj_time }}` (北京时间)
            *项目:* `${{ github.repository }}`
            *触发方式:* `${{ github.event_name }}`
            *更新结果:* ${{ steps.git_push.outputs.updated == 'true' && '🎉 发现新节点，已自动更新并推送！' || '😴 节点无变化，无需更新。' }}
            *📊 流量信息:* ${{ steps.traffic.outputs.info }}

            [点击查看配置文件](https://raw.githubusercontent.com/${{ github.repository }}/main/my_subscription.yaml)

      - name: Notify Telegram on Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *⚠️ 节点同步任务失败！*

            *📅 时间:* `${{ steps.time.outputs.bj_time }}` (北京时间)
            *项目:* `${{ github.repository }}`
            *状态:* 提取脚本报错或 Git 推送冲突，请尽快检查！

            [前往查看错误日志排查](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Delete old workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 1
